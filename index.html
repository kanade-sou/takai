<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマホ完結｜ケーブル地上高測定ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#f9fafb;}
header{padding:10px;font-size:15px;font-weight:bold;background:linear-gradient(90deg,#2563eb,#06b6d4);color:#fff;}
canvas{width:100vw;height:60vh;background:#e5e7eb;touch-action:none;}
.panel{padding:12px;}
input,button{width:100%;padding:10px;margin-top:8px;font-size:15px;}
.ref{background:#f59e0b;color:#fff;font-weight:bold;}
.calc{background:#dc2626;color:#fff;font-weight:bold;}
.reset{background:#6b7280;color:#fff;font-weight:bold;}
.ok{color:#16a34a;font-weight:bold;}
.ng{color:#dc2626;font-weight:bold;}
.guide{font-size:13px;color:#374151;margin-top:6px;}
</style>
</head>

<body>
<header>📱 スマホ完結｜ケーブル地上高測定ツール</header>
<canvas id="canvas"></canvas>

<div class="panel">
  <input type="file" id="fileInput" accept="image/*">
  <input type="number" id="shootDist" placeholder="📏 撮影距離（m）">
  <input type="number" id="refHeight" placeholder="📐 参照物の高さ（m）">

  <button id="refBtn" class="ref">🟠 参照物を指定</button>
  <button id="calcBtn" class="calc">🔴 高さを計算</button>
  <button id="resetBtn" class="reset">↺ リセット</button>

  <div id="result"></div>
  <div class="guide">
    ①参照物を上下2点 → ②ケーブルを上下2点（常に完全垂直）
  </div>
</div>

<script>
/* ===== DOM ===== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const result = document.getElementById("result");
const refHeightInput = document.getElementById("refHeight");

/* ===== 状態 ===== */
let img = new Image();
let scale = 1, offsetX = 0, offsetY = 0;
let refPoints = [];
let cablePoints = [];
let mode = "ref";
let draggingPoint = null;
let dpr = window.devicePixelRatio || 1;

/* ===== resize ===== */
function resize(){
  const r = canvas.getBoundingClientRect();
  canvas.width  = r.width  * dpr;
  canvas.height = r.height * dpr;
  draw();
}
window.addEventListener("resize", resize);
resize();

/* ===== 描画 ===== */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(dpr*scale,0,0,dpr*scale,offsetX*dpr,offsetY*dpr);
  ctx.drawImage(img,0,0);
  drawLine(refPoints,"#f59e0b");
  drawLine(cablePoints,"#dc2626");
  drawTMarkers(refPoints,"#f59e0b");
  drawTMarkers(cablePoints,"#dc2626");
}

function drawLine(arr,color){
  if(arr.length === 2){
    ctx.strokeStyle = color;
    ctx.lineWidth = 2 / scale;
    ctx.beginPath();
    ctx.moveTo(arr[0].x, arr[0].y);
    ctx.lineTo(arr[1].x, arr[1].y);
    ctx.stroke();
  }
}

/* ===== T字マーカー（上下点共通）===== */
function drawTMarkers(arr, color){
  const halfLen = 12 / scale;
  const vertLen = 8 / scale;

  ctx.strokeStyle = color;
  ctx.lineWidth = 3 / scale;
  ctx.lineCap = "round";

  arr.forEach(p => {
    ctx.beginPath();

    // 横棒
    ctx.moveTo(p.x - halfLen, p.y);
    ctx.lineTo(p.x + halfLen, p.y);

    // 縦棒（下向きT）
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x, p.y + vertLen);

    ctx.stroke();
  });
}

/* ===== 座標 ===== */
function screenToWorld(x,y){
  const r = canvas.getBoundingClientRect();
  return {
    x:(x-r.left-offsetX)/scale,
    y:(y-r.top-offsetY)/scale
  };
}

function hitTest(x,y){
  const r=canvas.getBoundingClientRect();
  const sx=x-r.left, sy=y-r.top;
  for(const p of [...refPoints,...cablePoints]){
    const px=p.x*scale+offsetX;
    const py=p.y*scale+offsetY;
    if(Math.hypot(px-sx,py-sy)<12) return p;
  }
  return null;
}

/* ===== タッチ ===== */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  const t=e.touches[0];
  draggingPoint = hitTest(t.clientX,t.clientY);
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(!draggingPoint) return;
  const t=e.touches[0];
  const p=screenToWorld(t.clientX,t.clientY);
  const list = refPoints.includes(draggingPoint) ? refPoints : cablePoints;
  const baseX = list[0].x;
  draggingPoint.x = baseX;
  draggingPoint.y = p.y;
  draw();
},{passive:false});

canvas.addEventListener("touchend",e=>{
  if(!draggingPoint){
    const t = e.changedTouches[0];
    const p = screenToWorld(t.clientX,t.clientY);
    const arr = (mode==="ref") ? refPoints : cablePoints;
    if(arr.length < 2){
      if(arr.length === 1){
        p.x = arr[0].x;
      }
      arr.push(p);
      if(mode==="ref" && arr.length === 2) mode="cable";
    }
  }
  draggingPoint = null;
  draw();
});

/* ===== ボタン ===== */
refBtn.onclick = ()=>{
  mode="ref";
  refPoints=[];
  cablePoints=[];
  result.textContent="";
};

resetBtn.onclick = ()=>{
  img.src="";
  refPoints=[];
  cablePoints=[];
  mode="ref";
  scale=1; offsetX=0; offsetY=0;
  result.textContent="";
  draw();
};

calcBtn.onclick = ()=>{
  if(refPoints.length!==2 || cablePoints.length!==2){
    result.textContent="⚠️ 参照物とケーブルを2点ずつ指定してください";
    result.className="ng";
    return;
  }

  const refH = parseFloat(refHeightInput.value);
  if(!refH || refH<=0){
    result.textContent="⚠️ 参照物の高さを入力してください";
    result.className="ng";
    return;
  }

  const refPx = Math.abs(refPoints[1].y - refPoints[0].y);
  const cabPx = Math.abs(cablePoints[1].y - cablePoints[0].y);
  const h = (cabPx / refPx) * refH;

  result.innerHTML =
    `✅ 推定ケーブル地上高<br><b style="font-size:22px">${h.toFixed(2)} m</b>`;
  result.className="ok";
};

/* ===== 画像 ===== */
fileInput.onchange = e=>{
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      scale = canvas.clientWidth / img.width;
      offsetY = (canvas.clientHeight - img.height*scale) / 2;
      draw();
    };
    img.src = r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};
</script>
</body>
</html>
``
