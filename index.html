<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマホ完結｜ケーブル地上高測定ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#f9fafb;}
header{
  padding:10px;
  font-size:15px;
  font-weight:bold;
  background:linear-gradient(90deg,#2563eb,#06b6d4);
  color:#fff;
}
canvas{
  width:100vw;
  height:60vh;
  background:#e5e7eb;
  touch-action:none;
}
.panel{padding:12px;}
input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  font-size:15px;
}
.ref{background:#f59e0b;color:#fff;font-weight:bold;}
.calc{background:#dc2626;color:#fff;font-weight:bold;}
.reset{background:#6b7280;color:#fff;font-weight:bold;}
.ok{color:#16a34a;font-weight:bold;}
.ng{color:#dc2626;font-weight:bold;}
.guide{font-size:13px;color:#374151;margin-top:6px;}
</style>
</head>

<body>

<header>📱 スマホ完結｜ケーブル地上高測定ツール</header>
<canvas id="canvas"></canvas>

<div class="panel">
  <input type="file" id="fileInput" accept="image/*">

  <select id="device">
    <option value="">📱 iPhone機種を選択</option>
    <option value="ip17_pro">iPhone 17 Pro</option>
    <option value="ip17_max">iPhone 17 Pro Max</option>
    <option value="ip17">iPhone 17</option>
    <option value="ip16_pro">iPhone 16 Pro</option>
    <option value="ip16_max">iPhone 16 Pro Max</option>
    <option value="ip16">iPhone 16</option>
    <option value="ip15_pro">iPhone 15 Pro</option>
    <option value="ip15_max">iPhone 15 Pro Max</option>
    <option value="ip15">iPhone 15</option>
    <option value="ip14_pro">iPhone 14 Pro</option>
    <option value="ip14">iPhone 14</option>
    <option value="ip13_pro">iPhone 13 Pro</option>
    <option value="ip13">iPhone 13</option>
    <option value="ip12">iPhone 12</option>
    <option value="ipse">iPhone SE (第2・3世代)</option>
  </select>

  <input type="number" id="shootDist" placeholder="📏 撮影距離（m）">
  <input type="number" id="refHeight" placeholder="📐 参照物の高さ（m）">

  <button id="refBtn" class="ref">🟠 参照物を指定</button>
  <button id="calcBtn" class="calc">🔴 高さを計算</button>
  <button id="resetBtn" class="reset">↺ リセット</button>

  <div id="result"></div>
  <div class="guide">
    ①参照物 → ②ケーブル（底点共有・点と線は完全連動）
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();
let scale = 1, offsetX = 0, offsetY = 0;
let refPoints = [], cablePoints = [];
let mode = "ref";
let draggingPoint = null;
let dpr = window.devicePixelRatio || 1;

/* ===== 下点取得 ===== */
function getLowerPoint(arr){
  if(arr.length !== 2) return null;
  return arr[0].y > arr[1].y ? arr[0] : arr[1];
}

/* ✅ 初期ズレ防止用（追加） */
function syncBottom(){
  if(refPoints.length !== 2 || cablePoints.length < 1) return;
  const refBottom = getLowerPoint(refPoints);
  cablePoints[0].x = refBottom.x;
  cablePoints[0].y = refBottom.y;
}

/* ===== resize ===== */
function resize(){
  const r = canvas.getBoundingClientRect();
  canvas.width  = r.width  * dpr;
  canvas.height = r.height * dpr;
  draw();
}
window.addEventListener("resize", resize);
resize();

/* ===== 描画 ===== */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform(dpr*scale,0,0,dpr*scale,offsetX*dpr,offsetY*dpr);
  ctx.drawImage(img,0,0);

  drawVerticalLine(refPoints,"#f59e0b");
  drawVerticalLine(cablePoints,"#dc2626");
  drawPoints(refPoints,"#f59e0b");
  drawPoints(cablePoints,"#dc2626");
}

function drawVerticalLine(arr,color){
  if(arr.length !== 2) return;
  const base = getLowerPoint(arr);
  const y1 = Math.min(arr[0].y, arr[1].y);
  const y2 = Math.max(arr[0].y, arr[1].y);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2/scale;
  ctx.beginPath();
  ctx.moveTo(base.x,y1);
  ctx.lineTo(base.x,y2);
  ctx.stroke();
}

function drawPoints(arr,c){
  const r=4/scale;
  arr.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=c;
    ctx.fill();
    ctx.strokeStyle="#fff";
    ctx.lineWidth=1/scale;
    ctx.stroke();
  });
}

function screenToWorld(x,y){
  const r=canvas.getBoundingClientRect();
  return {
    x:(x-r.left-offsetX)/scale,
    y:(y-r.top-offsetY)/scale
  };
}

function hitTest(x,y){
  const r=canvas.getBoundingClientRect();
  const sx=x-r.left, sy=y-r.top;
  for(const p of [...refPoints,...cablePoints]){
    if(Math.hypot(p.x*scale+offsetX-sx,p.y*scale+offsetY-sy)<12) return p;
  }
  return null;
}

/* ===== タッチ ===== */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  draggingPoint = hitTest(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(!draggingPoint) return;

  const p = screenToWorld(e.touches[0].clientX,e.touches[0].clientY);
  const isRef = refPoints.includes(draggingPoint);
  const arr = isRef ? refPoints : cablePoints;

  arr.forEach(pt => pt.x = p.x);
  draggingPoint.y = p.y;

  if(isRef && refPoints.length===2 && cablePoints.length>=1){
    const refBottom = getLowerPoint(refPoints);
    const cableBottom = cablePoints[0];
    if(draggingPoint === refBottom){
      cableBottom.x = refBottom.x;
      cableBottom.y = refBottom.y;
    }
  }

  draw();
},{passive:false});

canvas.addEventListener("touchend",e=>{
  if(!draggingPoint){
    const p = screenToWorld(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    const arr = (mode==="ref") ? refPoints : cablePoints;

    if(arr.length < 2){
      arr.push(p);

      if(mode==="ref" && refPoints.length===2){
        const refBottom = getLowerPoint(refPoints);
        cablePoints = [{ x: refBottom.x, y: refBottom.y }];
        syncBottom();     // ✅ バグ修正ポイント
        mode="cable";
      }
    }
  }
  draggingPoint=null;
  draw();
});

/* ===== ボタン ===== */
refBtn.onclick=()=>{
  mode="ref";
  refPoints=[]; cablePoints=[];
  result.textContent="";
};

calcBtn.onclick=()=>{
  const dev=device.value;
  if(!dev||refPoints.length!==2||cablePoints.length!==2){
    result.innerHTML="<span class='ng'>入力不足</span>"; return;
  }
  const D=+shootDist.value, Hr=+refHeight.value;
  const cam=cameraDB[dev];
  const fpx=cam.f*img.width/cam.sensor;
  const href=Math.abs(refPoints[1].y-refPoints[0].y);
  const hc=Math.abs(cablePoints[1].y-cablePoints[0].y);
  const H=hc/fpx*D*(Hr/(href/fpx*D));
  result.innerHTML=`<span class="ok">✅ ケーブル地上高：${H.toFixed(2)} m</span>`;
};

resetBtn.onclick=()=>{
  img.src="";
  refPoints=[]; cablePoints=[];
  mode="ref"; scale=1; offsetX=0; offsetY=0;
  result.textContent="";
  draw();
};

fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      scale=canvas.clientWidth/img.width;
      offsetX=0;
      offsetY=(canvas.clientHeight-img.height*scale)/2;
      draw();
    };
    img.src=r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};
</script>

</body>
</html>
