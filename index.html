<!-- 省略なし完全版・差分込み -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマホ完結｜ケーブル地上高測定ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#f9fafb;}
header{
  padding:10px;
  font-size:15px;
  font-weight:bold;
  background:linear-gradient(90deg,#2563eb,#06b6d4);
  color:#fff;
}
canvas{
  width:100vw;
  height:60vh;
  background:#e5e7eb;
  touch-action:none;
}
.panel{padding:12px;}
input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  font-size:15px;
}
.ref{background:#f59e0b;color:#fff;font-weight:bold;}
.calc{background:#dc2626;color:#fff;font-weight:bold;}
.reset{background:#6b7280;color:#fff;font-weight:bold;}
.ok{color:#16a34a;font-weight:bold;}
.ng{color:#dc2626;font-weight:bold;}
.guide{font-size:13px;color:#374151;margin-top:6px;}
</style>
</head>

<body>

<header>📱 スマホ完結｜ケーブル地上高測定ツール</header>
<canvas id="canvas"></canvas>

<div class="panel">
  <input type="file" id="fileInput" accept="image/*">
  <select id="device"></select>
  <input type="number" id="shootDist" placeholder="📏 撮影距離（m）">
  <input type="number" id="refHeight" placeholder="📐 参照物の高さ（m）">
  <button id="refBtn" class="ref">🟠 参照物を指定</button>
  <button id="calcBtn" class="calc">🔴 高さを計算</button>
  <button id="resetBtn" class="reset">↺ リセット</button>
  <div id="result"></div>
  <div class="guide">ドラッグ中は十字カーソルで微調整できます</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img=new Image(), scale=1, offsetX=0, offsetY=0;
let refPoints=[], cablePoints=[];
let mode="ref", draggingPoint=null;
let dpr=window.devicePixelRatio||1;

/* ===== resize ===== */
function resize(){
  const r=canvas.getBoundingClientRect();
  canvas.width=r.width*dpr;
  canvas.height=r.height*dpr;
  draw();
}
window.addEventListener("resize",resize);
resize();

/* ===== 描画 ===== */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.setTransform(dpr*scale,0,0,dpr*scale,offsetX*dpr,offsetY*dpr);
  ctx.drawImage(img,0,0);

  drawVerticalLine(refPoints,"#f59e0b");
  drawVerticalLine(cablePoints,"#dc2626");
  drawPoints(refPoints,"#f59e0b");
  drawPoints(cablePoints,"#dc2626");

  if(draggingPoint) drawCrosshair(draggingPoint);
}

/* ===== 垂直線 ===== */
function drawVerticalLine(arr,color){
  if(arr.length!==2) return;
  const x=arr[0].x;
  const y1=Math.min(arr[0].y,arr[1].y);
  const y2=Math.max(arr[0].y,arr[1].y);
  ctx.strokeStyle=color;
  ctx.lineWidth=2/scale;
  ctx.beginPath();
  ctx.moveTo(x,y1);
  ctx.lineTo(x,y2);
  ctx.stroke();
}

/* ===== 点 ===== */
function drawPoints(arr,c){
  const r=4/scale;
  arr.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=c;
    ctx.fill();
    ctx.strokeStyle="#fff";
    ctx.lineWidth=1/scale;
    ctx.stroke();
  });
}

/* ✅ 十字カーソル */
function drawCrosshair(p){
  const size=14/scale;
  ctx.strokeStyle="#2563eb";
  ctx.lineWidth=1/scale;
  ctx.beginPath();
  ctx.moveTo(p.x-size,p.y);
  ctx.lineTo(p.x+size,p.y);
  ctx.moveTo(p.x,p.y-size);
  ctx.lineTo(p.x,p.y+size);
  ctx.stroke();
}

/* ===== 座標変換 ===== */
function screenToWorld(x,y){
  const r=canvas.getBoundingClientRect();
  return {x:(x-r.left-offsetX)/scale,y:(y-r.top-offsetY)/scale};
}

function hitTest(x,y){
  const r=canvas.getBoundingClientRect();
  const sx=x-r.left, sy=y-r.top;
  for(const p of [...refPoints,...cablePoints]){
    if(Math.hypot(p.x*scale+offsetX-sx,p.y*scale+offsetY-sy)<12) return p;
  }
  return null;
}

/* ===== タッチ ===== */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  draggingPoint=hitTest(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(!draggingPoint) return;
  const p=screenToWorld(e.touches[0].clientX,e.touches[0].clientY);
  const arr=refPoints.includes(draggingPoint)?refPoints:cablePoints;
  arr.forEach(pt=>pt.x=p.x);
  draggingPoint.y=p.y;
  draw();
},{passive:false});

canvas.addEventListener("touchend",()=>{
  draggingPoint=null;
  draw();
});
</script>

</body>
</html>
