<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマホ完結｜ケーブル地上高測定ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#f9fafb;}
header{
  padding:10px;
  font-size:15px;
  font-weight:bold;
  background:linear-gradient(90deg,#2563eb,#06b6d4);
  color:#fff;
}
canvas{
  width:100vw;
  height:60vh;
  background:#e5e7eb;
  touch-action:none;
}
.panel{padding:12px;}
input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  font-size:15px;
}
.ref{background:#f59e0b;color:#fff;font-weight:bold;}
.calc{background:#dc2626;color:#fff;font-weight:bold;}
.reset{background:#6b7280;color:#fff;font-weight:bold;}
.ok{color:#16a34a;font-weight:bold;}
.ng{color:#dc2626;font-weight:bold;}
.guide{font-size:13px;color:#374151;margin-top:6px;}
</style>
</head>

<body>

<header>📱 スマホ完結｜ケーブル地上高測定ツール</header>
<canvas id="canvas"></canvas>

<div class="panel">
  <input type="file" id="fileInput" accept="image/*">

  <select id="device">
    <option value="">📱 iPhone機種を選択</option>
    <option value="ip17_pro">iPhone 17 Pro</option>
    <option value="ip17_max">iPhone 17 Pro Max</option>
    <option value="ip17">iPhone 17</option>
    <option value="ip16_pro">iPhone 16 Pro</option>
    <option value="ip16_max">iPhone 16 Pro Max</option>
    <option value="ip16">iPhone 16</option>
    <option value="ip15_pro">iPhone 15 Pro</option>
    <option value="ip15_max">iPhone 15 Pro Max</option>
    <option value="ip15">iPhone 15</option>
    <option value="ip14_pro">iPhone 14 Pro</option>
    <option value="ip14">iPhone 14</option>
    <option value="ip13_pro">iPhone 13 Pro</option>
    <option value="ip13">iPhone 13</option>
    <option value="ip12">iPhone 12</option>
    <option value="ipse">iPhone SE (第2・3世代)</option>
  </select>

  <input type="number" id="shootDist" placeholder="📏 撮影距離（m）">
  <input type="number" id="refHeight" placeholder="📐 参照物の高さ（m）">

  <button id="refBtn" class="ref">🟠 参照物を指定</button>
  <button id="calcBtn" class="calc">🔴 高さを計算</button>
  <button id="resetBtn" class="reset">↺ リセット</button>

  <div id="result"></div>
  <div class="guide">
    底点1オブジェクト・完全垂直固定
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img=new Image();
let scale=1, offsetX=0, offsetY=0;
let dpr=window.devicePixelRatio||1;

let bottomPoint=null;
let refTop=null;
let cableTop=null;
let mode="ref";
let draggingPoint=null;

const DISPLAY_OFFSET = 14;

/* resize */
function resize(){
  const r=canvas.getBoundingClientRect();
  canvas.width=r.width*dpr;
  canvas.height=r.height*dpr;
  draw();
}
window.addEventListener("resize",resize);
resize();

/* 描画 */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(dpr*scale,0,0,dpr*scale,offsetX*dpr,offsetY*dpr);
  ctx.drawImage(img,0,0);

  if(bottomPoint && refTop){
    drawLine(refTop,bottomPoint,"#f59e0b",-DISPLAY_OFFSET/scale);
  }
  if(bottomPoint && cableTop){
    drawLine(cableTop,bottomPoint,"#dc2626", DISPLAY_OFFSET/scale);
  }

  drawPoint(bottomPoint,"#fbbf24");
  drawPoint(refTop,"#f59e0b",-DISPLAY_OFFSET/scale);
  drawPoint(cableTop,"#dc2626", DISPLAY_OFFSET/scale);
}

function drawLine(top,bottom,color,dx){
  ctx.strokeStyle=color;
  ctx.lineWidth=2/scale;
  ctx.beginPath();
  ctx.moveTo(bottom.x+dx,bottom.y);
  ctx.lineTo(bottom.x+dx,top.y);
  ctx.stroke();
}

function drawPoint(p,color,dx=0){
  if(!p) return;
  const r=4/scale;
  ctx.beginPath();
  ctx.arc(p.x+dx,p.y,r,0,Math.PI*2);
  ctx.fillStyle=color;
  ctx.fill();
  ctx.strokeStyle="#fff";
  ctx.lineWidth=1/scale;
  ctx.stroke();
}

/* 座標変換 */
function screenToWorld(x,y){
  const r=canvas.getBoundingClientRect();
  return {x:(x-r.left-offsetX)/scale,y:(y-r.top-offsetY)/scale};
}

/* ヒットテスト */
function hitTest(x,y){
  const r=canvas.getBoundingClientRect();
  const sx=x-r.left, sy=y-r.top;
  for(const p of [bottomPoint,refTop,cableTop]){
    if(p && Math.hypot(p.x*scale+offsetX-sx,p.y*scale+offsetY-sy)<12) return p;
  }
  return null;
}

/* タッチ */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  draggingPoint=hitTest(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(!draggingPoint) return;
  const p=screenToWorld(e.touches[0].clientX,e.touches[0].clientY);

  draggingPoint.y = p.y;
  if(bottomPoint){
    draggingPoint.x = bottomPoint.x; // ✅ 垂直完全固定
  }
  draw();
},{passive:false});

canvas.addEventListener("touchend",e=>{
  if(!draggingPoint){
    const p=screenToWorld(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    if(mode==="ref"){
      if(!refTop) refTop={x:p.x,y:p.y};
      else{
        bottomPoint={x:p.x,y:p.y};
        refTop.x=bottomPoint.x;
        mode="cable";
      }
    }else{
      if(!cableTop){
        cableTop={x:bottomPoint.x,y:p.y};
      }
    }
  }
  draggingPoint=null;
  draw();
});

/* ボタン */
refBtn.onclick=()=>{
  mode="ref";
  bottomPoint=null;
  refTop=null;
  cableTop=null;
  result.textContent="";
};

resetBtn.onclick=()=>{
  img.src="";
  bottomPoint=null;
  refTop=null;
  cableTop=null;
  mode="ref";
  scale=1; offsetX=0; offsetY=0;
  result.textContent="";
  draw();
};

fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      scale=canvas.clientWidth/img.width;
      offsetX=0;
      offsetY=(canvas.clientHeight-img.height*scale)/2;
      draw();
    };
    img.src=r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};
</script>

</body>
</html>
