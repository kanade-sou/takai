<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマホ完結｜ケーブル地上高測定ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#f9fafb;}
header{padding:10px;font-size:15px;font-weight:bold;background:linear-gradient(90deg,#2563eb,#06b6d4);color:#fff;}
canvas{width:100vw;height:60vh;background:#e5e7eb;touch-action:none;}
.panel{padding:12px;}
input,button{width:100%;padding:10px;margin-top:8px;font-size:15px;}
.ref{background:#f59e0b;color:#fff;font-weight:bold;}
.calc{background:#dc2626;color:#fff;font-weight:bold;}
.reset{background:#6b7280;color:#fff;font-weight:bold;}
.ok{color:#16a34a;font-weight:bold;}
.ng{color:#dc2626;font-weight:bold;}
.guide{font-size:13px;color:#374151;margin-top:6px;}
</style>
</head>

<body>
<header>📱 スマホ完結｜ケーブル地上高測定ツール</header>

<canvas id="canvas"></canvas>

<div class="panel">
  <input type="file" id="fileInput" accept="image/*">
  <input type="number" id="shootDist" placeholder="📏 撮影距離（m）">
  <input type="number" id="refHeight" placeholder="📐 参照物の高さ（m）">
  <button id="refBtn" class="ref">🟠 参照物を指定</button>
  <button id="calcBtn" class="calc">🔴 高さを計算</button>
  <button id="resetBtn" class="reset">↺ リセット</button>
  <div id="result"></div>
  <div class="guide">①参照物 → ②ケーブルを上下2点（上下のみ動可）</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let img = new Image();
let scale = 1, offsetX = 0, offsetY = 0;
let refPoints = [], cablePoints = [];
let mode = "ref";
let draggingPoint = null;
let spiral = null;
let dpr = window.devicePixelRatio || 1;

/* ===== ルーペ ===== */
let showLoupe=false, loupeX=0, loupeY=0;
const LOUPE_SIZE=80, LOUPE_ZOOM=2.5;

/* ===== resize ===== */
function resize(){
  const r=canvas.getBoundingClientRect();
  dpr=window.devicePixelRatio||1;
  canvas.width=r.width*dpr;
  canvas.height=r.height*dpr;
  draw();
}
window.addEventListener("resize",resize);
resize();

/* ===== 描画 ===== */
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(dpr*scale,0,0,dpr*scale,offsetX*dpr,offsetY*dpr);
  ctx.drawImage(img,0,0);
  drawLine(refPoints,"#f59e0b");
  drawLine(cablePoints,"#dc2626");
  drawPoints(refPoints,"#f59e0b");
  drawPoints(cablePoints,"#dc2626");
  drawFeedback();
  ctx.setTransform(1,0,0,1,0,0);
  drawLoupe();
}

function drawLine(arr,c){
  if(arr.length===2){
    ctx.strokeStyle=c;
    ctx.lineWidth=2/scale;
    ctx.beginPath();
    ctx.moveTo(arr[0].x,arr[0].y);
    ctx.lineTo(arr[1].x,arr[1].y);
    ctx.stroke();
  }
}

function drawPoints(arr,c){
  const r=4/scale;
  arr.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=c;
    ctx.fill();
    ctx.strokeStyle="#fff";
    ctx.lineWidth=1/scale;
    ctx.stroke();
  });
}

/* ===== 直線フィードバック ===== */
function drawFeedback(){
  if(!spiral) return;
  const {x,y,t,c}=spiral;
  const len=t*12;
  ctx.strokeStyle=c;
  ctx.lineWidth=1.5/scale;
  ctx.beginPath();
  ctx.moveTo(x,y-len/2);
  ctx.lineTo(x,y+len/2);
  ctx.stroke();
  spiral.t+=0.4;
  if(spiral.t<6) requestAnimationFrame(draw);
  else spiral=null;
}

/* ===== ルーペ ===== */
function drawLoupe(){
  if(!showLoupe||!img.src) return;
  const wx=(loupeX-offsetX)/scale;
  const wy=(loupeY-offsetY)/scale;
  const s=LOUPE_SIZE, z=LOUPE_ZOOM;
  const src=s/z;
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle="#fff";
  ctx.fillRect(loupeX-s/2,loupeY-s/2,s,s);
  ctx.drawImage(img,wx-src/2,wy-src/2,src,src,loupeX-s/2,loupeY-s/2,s,s);
  ctx.strokeStyle="#2563eb";
  ctx.lineWidth=1.5;
  ctx.strokeRect(loupeX-s/2,loupeY-s/2,s,s);
  ctx.restore();
}

/* ===== 座標 ===== */
function screenToWorld(x,y){
  const r=canvas.getBoundingClientRect();
  return {x:(x-r.left-offsetX)/scale,y:(y-r.top-offsetY)/scale};
}
function hitTest(x,y){
  const r=canvas.getBoundingClientRect();
  const sx=x-r.left, sy=y-r.top;
  for(const p of [...refPoints,...cablePoints]){
    const px=p.x*scale+offsetX;
    const py=p.y*scale+offsetY;
    if(Math.hypot(px-sx,py-sy)<12) return p;
  }
  return null;
}

/* ===== タッチ ===== */
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  const t=e.touches[0];
  draggingPoint=hitTest(t.clientX,t.clientY);
  if(draggingPoint){
    showLoupe=true;
    const r=canvas.getBoundingClientRect();
    loupeX=t.clientX-r.left;
    loupeY=t.clientY-r.top-60;
  }
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(!draggingPoint) return;

  const t=e.touches[0];
  const r=canvas.getBoundingClientRect();
  const p=screenToWorld(t.clientX,t.clientY);

  // ★ 垂直固定処理
  const list=refPoints.includes(draggingPoint)?refPoints:cablePoints;
  const other=list.find(pt=>pt!==draggingPoint);
  draggingPoint.x=other?other.x:p.x;
  draggingPoint.y=p.y;

  loupeX=t.clientX-r.left;
  loupeY=t.clientY-r.top-60;
  draw();
},{passive:false});

canvas.addEventListener("touchend",e=>{
  if(!draggingPoint){
    const t=e.changedTouches[0];
    const p=screenToWorld(t.clientX,t.clientY);
    const arr=(mode==="ref")?refPoints:cablePoints;
    if(arr.length<2){
      if(arr.length===1){
        p.x=arr[0].x; // ★ 追加時も垂直揃え
      }
      arr.push(p);
      spiral={x:p.x,y:p.y,t:0,c:(mode==="ref")?"#f59e0b":"#dc2626"};
      if(mode==="ref"&&arr.length===2) mode="cable";
    }
  }
  showLoupe=false;
  draggingPoint=null;
  draw();
});

/* ===== ボタン ===== */
refBtn.onclick=()=>{mode="ref";refPoints=[];cablePoints=[];result.textContent="";};
resetBtn.onclick=()=>{img.src="";refPoints=[];cablePoints=[];mode="ref";scale=1;offsetX=0;offsetY=0;result.textContent="";draw();};

calcBtn.onclick=()=>{
  if(refPoints.length!==2||cablePoints.length!==2){
    result.textContent="⚠️ 2点ずつ指定してください";
    result.className="ng"; return;
  }
  const h=parseFloat(refHeight.value);
  if(!h){ result.textContent="⚠️ 高さを入力"; result.className="ng"; return;}
  const refPx=Math.abs(refPoints[1].y-refPoints[0].y);
  const cabPx=Math.abs(cablePoints[1].y-cablePoints[0].y);
  const m=(cabPx/refPx)*h;
  result.innerHTML=`✅ 推定地上高<br><b style="font-size:22px">${m.toFixed(2)} m</b>`;
  result.className="ok";
};

fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    img.onload=()=>{
      scale=canvas.clientWidth/img.width;
      offsetX=0;
      offsetY=(canvas.clientHeight-img.height*scale)/2;
      draw();
    };
    img.src=r.result;
  };
  r.readAsDataURL(e.target.files[0]);
};
</script>
</body>
</html>
